services:
  - type: web
    name: your-bot-name
    runtime: node
    branch: main
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # ═══════════════════════════════════════════════════════════════════
      # REQUIRED: Twitch Bot Configuration
      # ═══════════════════════════════════════════════════════════════════
      - key: TWITCH_USERNAME
        value: "your-bot-username"
      - key: JOIN_CHANNELS
        value: "your-channel-1,your-channel-2"
      - key: TWITCH_CLIENT_ID
        value: "your-twitch-client-id"
      - key: TWITCH_CLIENT_SECRET
        value: "your-twitch-client-secret"

      # ═══════════════════════════════════════════════════════════════════
      # REQUIRED: AI & API Keys
      # ═══════════════════════════════════════════════════════════════════
      - key: GEMINI_API_KEY
        value: "your-gemini-api-key(s)"
      - key: POLLINATIONS_API_KEY
        value: "your-pollinations-api-key"
      - key: UPSTASH_REDIS_URL
        value: "your-upstash-redis-url"

      # ═══════════════════════════════════════════════════════════════════
      # OPTIONAL: Command Names (customizable triggers)
      # ═══════════════════════════════════════════════════════════════════
      - key: BOT_COMMAND_NAME
        value: "!ask,@yourbotusername"
      - key: IMAGE_COMMAND_NAME
        value: "!image"
      - key: VIDEO_COMMAND_NAME
        value: "!video"
      - key: TTS_COMMAND_NAME
        value: "!tts"
      - key: MUSIC_COMMAND_NAME
        value: "!song"

      # ═══════════════════════════════════════════════════════════════════
      # OPTIONAL: Emote Providers
      # ═══════════════════════════════════════════════════════════════════
      - key: ENABLE_7TV_EMOTES
        value: "true"
      - key: ENABLE_BTTV_EMOTES
        value: "true"
      - key: ENABLE_FFZ_EMOTES
        value: "true"
      - key: ENABLE_EMOTE_APPENDING
        value: "true"
      - key: EMOTE_APPEND_EXCLUDE_PREFIXES
        value: "!settitle"

      # ═══════════════════════════════════════════════════════════════════
      # OPTIONAL: Behavior Tuning
      # ═══════════════════════════════════════════════════════════════════
      - key: COOLDOWN_DURATION
        value: "1"
      - key: ENABLE_SEARCH_GROUNDING
        value: "true"
      - key: MODEL_NAME
        value: "gemini-2.5-flash"
      - key: POLLINATIONS_IMAGE_MODEL
        value: "gptimage"
      - key: POLLINATIONS_VIDEO_MODEL
        value: "seedance"
      - key: POLLINATIONS_TTS_MODEL
        value: "elevenlabs"
      - key: POLLINATIONS_TTS_VOICE
        value: "charlotte"
      - key: POLLINATIONS_MUSIC_MODEL
        value: "elevenmusic"
      - key: GEMINI_MAX_RESPONSE_LENGTH
        value: "450"
      - key: AI_HISTORY_LENGTH
        value: "10"
      - key: CHAT_CONTEXT_LENGTH
        value: "10"
      - key: IGNORED_USERNAMES
        value: "StreamElements,Nightbot"

      # ═══════════════════════════════════════════════════════════════════
      # OPTIONAL: Additional API Keys
      # ═══════════════════════════════════════════════════════════════════
      - key: YOUTUBE_API_KEY
        value: "your-youtube-api-key"